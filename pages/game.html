<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game — PixelArcade</title>
<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/game.css">
</head>
<body class="dark-theme">

<nav class="navbar">
  <a class="nav-logo" href="../index.html">
    <span class="pixel-icon">🕹️</span>
    <span class="logo-text">Pixel<em>Arcade</em></span>
  </a>
  <div class="nav-right">
    <a class="nav-link" href="../index.html" data-i18n="nav.home">Home</a>
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn" id="langBtn">🌐 EN ▾</button>
      <div class="lang-dropdown" id="langDropdown"></div>
    </div>
  </div>
</nav>

<!-- AD: TOP -->
<div class="ad-slot ad-top">
  <div class="ad-placeholder">Advertisement</div>
</div>

<div class="container game-page">
  <div class="game-detail-layout">
    <!-- LEFT: Player -->
    <div>
      <div class="game-title-bar">
        <h1 id="gameTitle">Loading...</h1>
        <div class="game-tags" id="gameTags"></div>
      </div>
      <div class="game-player-wrap" id="playerWrap">
        <iframe id="gameFrame" allowfullscreen></iframe>
        <button class="fullscreen-btn" id="fsBtn">⛶ Fullscreen</button>
      </div>
      <p style="color:var(--text2);font-size:13px;margin-top:12px;" id="gameDesc"></p>

      <!-- AD: below player -->
      <div class="ad-slot ad-mid" style="margin:24px 0">
        <div class="ad-placeholder">Advertisement</div>
      </div>

      <!-- Related -->
      <div class="section-header">
        <h2 class="section-title">🎮 More Games</h2>
      </div>
      <div class="related-games" id="relatedGames"></div>
    </div>

    <!-- RIGHT: Sidebar -->
    <div class="game-sidebar">
      <div class="ad-sidebar">
        <div class="ad-placeholder" style="padding:80px 24px;">Ad 300×250</div>
      </div>
      <div class="ad-sidebar">
        <div class="ad-placeholder" style="padding:80px 24px;">Ad 300×250</div>
      </div>
    </div>
  </div>
</div>

<!-- REWARDED AD MODAL -->
<div class="rewarded-modal" id="rewardedModal">
  <div class="rewarded-box">
    <h2>Game Over!</h2>
    <p>Watch a short ad to continue playing and get an extra life.</p>
    <div class="rewarded-actions">
      <button class="btn-watch" id="btnWatch">▶ Watch Ad &amp; Continue</button>
      <button class="btn-skip" id="btnSkip">Skip</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-logo">🕹️ PixelArcade</div>
    <div class="footer-links">
      <a href="about.html" data-i18n="footer.about">About</a>
      <a href="privacy.html" data-i18n="footer.privacy">Privacy</a>
    </div>
    <p class="footer-copy">© 2026 PixelArcade</p>
  </div>
</footer>

<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/games-data.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const game = GAMES.find(g => g.id === id);

  if (!game) { document.getElementById('gameTitle').textContent = 'Game not found'; return; }

  document.title = `${game.name} — PixelArcade`;
  document.getElementById('gameTitle').textContent = game.name;
  document.getElementById('gameDesc').textContent = game.desc;
  document.getElementById('gameFrame').src = game.url;

  // Tags
  const tagsEl = document.getElementById('gameTags');
  tagsEl.innerHTML = game.tags.map(t => `<span class="game-tag">${t}</span>`).join('');

  // Fullscreen
  document.getElementById('fsBtn').addEventListener('click', () => {
    const wrap = document.getElementById('playerWrap');
    if (wrap.requestFullscreen) wrap.requestFullscreen();
  });

  // Related games (same category, exclude current)
  const related = GAMES.filter(g => g.category === game.category && g.id !== game.id).slice(0, 6);
  const relEl = document.getElementById('relatedGames');
  relEl.innerHTML = related.map(g => `
    <div class="game-card" onclick="location.href='game.html?id=${g.id}'">
      <div class="game-thumb-placeholder" style="font-size:32px">${g.emoji}</div>
      <div class="game-info">
        <div class="game-name">${g.name}</div>
        <div class="game-meta"><span class="game-cat">${g.category}</span></div>
      </div>
    </div>`).join('');

  // Rewarded ad modal (triggered by game via postMessage)
  window.addEventListener('message', e => {
    if (e.data === 'gameover') {
      document.getElementById('rewardedModal').classList.add('show');
    }
  });
  document.getElementById('btnWatch').addEventListener('click', () => {
    // TODO: trigger actual rewarded ad SDK here
    document.getElementById('rewardedModal').classList.remove('show');
    document.getElementById('gameFrame').contentWindow.postMessage('revive','*');
  });
  document.getElementById('btnSkip').addEventListener('click', () => {
    document.getElementById('rewardedModal').classList.remove('show');
  });
})();
</script>
</body>
</html>
