<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — PixelArcade</title>
<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
#adminGate{
  position:fixed;inset:0;background:#0a0a1f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;
}
#adminGate h2{color:var(--neon-pink,#ff2d78);margin-bottom:20px;font-family:monospace}
#adminGate input{
  padding:10px 16px;border-radius:8px;border:1px solid #333;
  background:#111;color:#fff;font-size:14px;margin-bottom:12px;width:240px
}
#adminGate button{
  padding:10px 32px;background:var(--neon-pink,#ff2d78);
  color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px
}
#adminGate .err{color:#ff6b6b;font-size:12px;margin-top:8px;display:none}
</style>
</head>
<body class="dark-theme">

<!-- 阆之门：客户端密码保护 -->
<div id="adminGate">
  <h2>🔒 Admin Login</h2>
  <input type="password" id="pwdInput" placeholder="Enter admin password" autocomplete="current-password">
  <button id="pwdBtn">Enter</button>
  <p class="err" id="pwdErr">Wrong password.</p>
</div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html">
    <span class="pixel-icon">🕹️</span>
    <span class="logo-text">Pixel<em>Arcade</em></span>
  </a>
  <div class="nav-right">
    <span style="font-size:12px;color:var(--neon-pink);font-family:var(--font-pixel)">ADMIN</span>
  </div>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <h3>MENU</h3>
    <a class="admin-nav-link active" href="index.html">📊 Dashboard</a>
    <a class="admin-nav-link" href="ads.html">💰 Ad Slots</a>
    <a class="admin-nav-link" href="add-game.html">➕ Add Game</a>
    <a class="admin-nav-link" href="../index.html">🌐 View Site</a>
  </aside>

  <main class="admin-main">
    <h1 class="admin-title">📊 Dashboard</h1>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon">🎮</div>
        <div class="stat-val" id="statGames">-</div>
        <div class="stat-label">Total Games</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-val">98.4K</div>
        <div class="stat-label">Total Plays</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-val">7</div>
        <div class="stat-label">Active Ad Slots</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌐</div>
        <div class="stat-val">12</div>
        <div class="stat-label">Languages</div>
      </div>
    </div>

    <div class="section-header">
      <h2 class="section-title">🎮 Games</h2>
      <a href="add-game.html" class="cta-btn" style="font-size:9px;padding:8px 20px">+ Add</a>
    </div>
    <table class="admin-table" id="gamesTable">
      <thead>
        <tr>
          <th>Game</th><th>Category</th><th>Rating</th><th>Plays</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="gamesBody"></tbody>
    </table>
  </main>
</div>

<script src="../assets/js/games-data.js"></script>
<script>
// 密码验证（更改密码请修改此处）
const ADMIN_PWD_HASH = '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918'; // sha256("admin")

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const gate = document.getElementById('adminGate');
const pwdInput = document.getElementById('pwdInput');
const pwdBtn   = document.getElementById('pwdBtn');
const pwdErr   = document.getElementById('pwdErr');

// 如果已登录
if (sessionStorage.getItem('pa_admin') === '1') gate.style.display = 'none';

async function tryLogin() {
  const hash = await sha256(pwdInput.value);
  if (hash === ADMIN_PWD_HASH) {
    sessionStorage.setItem('pa_admin', '1');
    gate.style.display = 'none';
  } else {
    pwdErr.style.display = 'block';
    pwdInput.value = '';
  }
}

pwdBtn.addEventListener('click', tryLogin);
pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

// 表格渲染
if (typeof GAMES !== 'undefined') {
  document.getElementById('statGames').textContent = GAMES.length;
  const tbody = document.getElementById('gamesBody');
  tbody.innerHTML = GAMES.map(g => `
    <tr>
      <td>${g.emoji} ${g.name}</td>
      <td><span class="game-cat">${g.category}</span></td>
      <td style="color:var(--neon-yellow)">${g.rating} ★</td>
      <td>${g.plays.toLocaleString()}</td>
      <td style="display:flex;gap:6px">
        <button class="btn-sm btn-edit">Edit</button>
        <button class="btn-sm btn-del">Del</button>
      </td>
    </tr>`).join('');
}
</script>
</body>
</html>
