<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stack 叠叠乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;color:#eee;padding:16px;-webkit-tap-highlight-color:transparent}
h1{font-size:1.8rem;color:#fff;margin-bottom:6px;letter-spacing:3px}
.info{display:flex;gap:20px;margin-bottom:10px;font-size:.9rem}
.info span{background:#1a1a1a;padding:5px 14px;border-radius:20px}
.info b{color:#fff;font-size:1.1rem}
canvas{display:block;cursor:pointer;border-radius:4px}
.hint{margin-top:10px;font-size:.78rem;color:#555;text-align:center}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
#overlay h2{color:#fff;font-size:2.2rem;margin-bottom:10px;letter-spacing:2px}
#overlay p{color:#aaa;margin-bottom:20px;font-size:1rem}
#overlay button{background:#fff;color:#000;border:none;padding:12px 40px;border-radius:8px;font-size:1.1rem;font-weight:700;cursor:pointer;letter-spacing:1px}
</style>
</head>
<body>
<h1>🏗️ STACK</h1>
<div class="info">
  <span>当前 <b id="score">0</b></span>
  <span>最高 <b id="best">0</b></span>
</div>
<canvas id="c" width="320" height="480"></canvas>
<p class="hint">点击屏幕 / 空格键 放下方块</p>
<div id="overlay">
  <h2>STACK</h2>
  <p>点击放下方块，对准叠高！<br>堆得越高得分越多！</p>
  <button onclick="startGame()">开始</button>
</div>
<script>
var C=document.getElementById('c'),ctx=C.getContext('2d');
var W=320,H=480,BH=20,TOTAL=20;
var COLORS=[
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a'
];
var stack,cur,speed,dir,score,best,alive,raf;
best=+localStorage.getItem('stackBest')||0;
document.getElementById('best').textContent=best;
function startGame(){
  document.getElementById('overlay').style.display='none';
  stack=[];score=0;alive=true;
  document.getElementById('score').textContent=0;
  // base block
  stack.push({x:W/2-60,w:120,y:H-BH,color:COLORS[0]});
  spawnNext();
  if(raf)cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}
function spawnNext(){
  var prev=stack[stack.length-1];
  speed=2+Math.min(score*0.15,5);
  cur={x:0,w:prev.w,y:prev.y-BH,color:COLORS[stack.length%COLORS.length],dir:1};
  dir=1;
}
function loop(){
  if(!alive)return;
  update();draw();
  raf=requestAnimationFrame(loop);
}
function update(){
  cur.x+=speed*dir;
  if(cur.x+cur.w>W){cur.x=W-cur.w;dir=-1;}
  if(cur.x<0){cur.x=0;dir=1;}
}
function place(){
  if(!alive)return;
  var prev=stack[stack.length-1];
  var left=Math.max(cur.x,prev.x);
  var right=Math.min(cur.x+cur.w,prev.x+prev.w);
  var overlap=right-left;
  if(overlap<=0){endGame();return;}
  cur.x=left;cur.w=overlap;
  stack.push({x:cur.x,w:cur.w,y:cur.y,color:cur.color});
  score++;
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('stackBest',best);document.getElementById('best').textContent=best;}
  // scroll down if stack too tall
  if(stack.length>TOTAL){
    stack.forEach(function(b){b.y+=BH;});
    stack.shift();
  }
  spawnNext();
}
var HUE=0;
function draw(){
  HUE=(HUE+0.3)%360;
  // gradient background
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'hsl('+(HUE)+',60%,8%)');
  g.addColorStop(1,'hsl('+(HUE+60)+',60%,4%)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // placed blocks
  stack.forEach(function(b,i){
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x,b.y,b.w,BH-2);
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(b.x,b.y,b.w,4);
  });
  // moving block
  ctx.fillStyle=cur.color;
  ctx.fillRect(cur.x,cur.y,cur.w,BH-2);
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(cur.x,cur.y,cur.w,4);
  // score
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.font='bold 80px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(score,W/2,H/2);
}
function endGame(){
  alive=false;
  var ov=document.getElementById('overlay');
  ov.innerHTML='<h2>大功告成！</h2><p>叠了 '+score+' 层！最高纳：'+best+'</p><button onclick="startGame()">再来一局</button>';
  ov.style.display='flex';
}
document.addEventListener('keydown',function(e){if(e.key===' '){e.preventDefault();place();}});
C.addEventListener('click',place);
C.addEventListener('touchend',function(e){e.preventDefault();place();},{passive:false});
</script>
</body>
</html>
