<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf8ef;font-family:'Arial',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{color:#776e65;font-size:2.5rem;font-weight:700;margin-bottom:10px}
.header{display:flex;justify-content:space-between;align-items:center;width:340px;margin-bottom:16px}
.scores{display:flex;gap:10px}
.score-box{background:#bbada0;border-radius:6px;padding:8px 16px;text-align:center;min-width:70px}
.score-box .label{color:#eee4da;font-size:.7rem;text-transform:uppercase;font-weight:700}
.score-box .val{color:#fff;font-size:1.3rem;font-weight:700}
.btn{background:#8f7a66;color:#f9f6f2;border:none;border-radius:6px;padding:10px 18px;font-size:.9rem;font-weight:700;cursor:pointer}
.btn:hover{background:#776e65}
.grid-container{background:#bbada0;border-radius:8px;padding:12px;width:340px;height:340px;position:relative}
.grid-row{display:flex;gap:12px;margin-bottom:12px}
.grid-row:last-child{margin-bottom:0}
.cell{width:72px;height:72px;background:#cdc1b4;border-radius:4px}
#board{position:absolute;top:12px;left:12px;width:316px;height:316px}
.tile{position:absolute;width:72px;height:72px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.6rem;transition:all .1s ease;color:#776e65}
.tile[data-v='2']{background:#eee4da}
.tile[data-v='4']{background:#ede0c8}
.tile[data-v='8']{background:#f2b179;color:#f9f6f2}
.tile[data-v='16']{background:#f59563;color:#f9f6f2}
.tile[data-v='32']{background:#f67c5f;color:#f9f6f2}
.tile[data-v='64']{background:#f65e3b;color:#f9f6f2}
.tile[data-v='128']{background:#edcf72;color:#f9f6f2;font-size:1.3rem}
.tile[data-v='256']{background:#edcc61;color:#f9f6f2;font-size:1.3rem}
.tile[data-v='512']{background:#edc850;color:#f9f6f2;font-size:1.3rem}
.tile[data-v='1024']{background:#edc53f;color:#f9f6f2;font-size:1rem}
.tile[data-v='2048']{background:#edc22e;color:#f9f6f2;font-size:1rem}
.tile[data-v='4096']{background:#3c3a32;color:#f9f6f2;font-size:1rem}
.msg{display:none;position:absolute;inset:0;background:rgba(238,228,218,.73);border-radius:8px;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.msg.show{display:flex}
.msg h2{font-size:2rem;color:#776e65;margin-bottom:16px}
.hint{color:#776e65;font-size:.85rem;margin-top:12px;text-align:center;width:340px}
</style>
</head>
<body>
<h1>2048</h1>
<div class="header">
  <div class="scores">
    <div class="score-box"><div class="label">分数</div><div class="val" id="score">0</div></div>
    <div class="score-box"><div class="label">最高</div><div class="val" id="best">0</div></div>
  </div>
  <button class="btn" onclick="init()">新游戏</button>
</div>
<div class="grid-container">
  <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
  <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
  <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
  <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
  <div id="board">
    <div class="msg" id="msg"><h2 id="msg-text">游戏结束</h2><button class="btn" onclick="init()">再来一局</button></div>
  </div>
</div>
<p class="hint">方向键 / WASD / 滑动 移动方块，相同数字合并，达到 2048 获胜！</p>
<script>
var grid,score,best=+localStorage.getItem('best2048')||0;
document.getElementById('best').textContent=best;
function init(){grid=Array.from({length:4},()=>Array(4).fill(0));score=0;upd();addTile();addTile();render();}
function addTile(){var empty=[];for(var r=0;r<4;r++)for(var c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);if(!empty.length)return;var p=empty[Math.random()*empty.length|0];grid[p[0]][p[1]]=Math.random()<.9?2:4;}
function upd(){document.getElementById('score').textContent=score;if(score>best){best=score;localStorage.setItem('best2048',best);document.getElementById('best').textContent=best;}}
function render(){
  var board=document.getElementById('board');
  var tiles=board.querySelectorAll('.tile');tiles.forEach(t=>t.remove());
  for(var r=0;r<4;r++)for(var c=0;c<4;c++)if(grid[r][c]){
    var t=document.createElement('div');t.className='tile';t.setAttribute('data-v',grid[r][c]);
    t.textContent=grid[r][c];t.style.top=(r*84)+'px';t.style.left=(c*84)+'px';board.appendChild(t);
  }
}
function slide(row){var a=row.filter(x=>x);var b=[];var skip=false;for(var i=0;i<a.length;i++){if(!skip&&i+1<a.length&&a[i]===a[i+1]){b.push(a[i]*2);score+=a[i]*2;skip=true;}else if(skip){skip=false;}else b.push(a[i]);}while(b.length<4)b.push(0);return b;}
function move(dir){
  var moved=false;
  function slideAndCheck(row){var n=slide(row);if(n.join(',')!==row.join(','))moved=true;return n;}
  if(dir==='left')for(var r=0;r<4;r++)grid[r]=slideAndCheck(grid[r]);
  else if(dir==='right')for(var r=0;r<4;r++)grid[r]=slideAndCheck(grid[r].slice().reverse()).reverse();
  else if(dir==='up')for(var c=0;c<4;c++){var col=grid.map(r=>r[c]);var nc=slideAndCheck(col);for(var r=0;r<4;r++)grid[r][c]=nc[r];}
  else if(dir==='down')for(var c=0;c<4;c++){var col=grid.map(r=>r[c]).reverse();var nc=slideAndCheck(col).reverse();for(var r=0;r<4;r++)grid[r][c]=nc[r];}
  if(moved){addTile();upd();render();checkEnd();}
}
function checkEnd(){
  for(var r=0;r<4;r++)for(var c=0;c<4;c++){if(grid[r][c]===2048){show('你赢了！🎉');return;}}
  for(var r=0;r<4;r++)for(var c=0;c<4;c++){if(!grid[r][c])return;if(r+1<4&&grid[r][c]===grid[r+1][c])return;if(c+1<4&&grid[r][c]===grid[r][c+1])return;}
  show('游戏结束');
}
function show(t){document.getElementById('msg-text').textContent=t;document.getElementById('msg').classList.add('show');}
document.addEventListener('keydown',function(e){
  var map={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down','a':'left','d':'right','w':'up','s':'down','A':'left','D':'right','W':'up','S':'down'};
  if(map[e.key]){e.preventDefault();if(!document.getElementById('msg').classList.contains('show'))move(map[e.key]);}
});
var tx,ty;
document.querySelector('.grid-container').addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.querySelector('.grid-container').addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)){move(dx>0?'right':'left');}else{move(dy>0?'down':'up');}},{passive:true});
document.getElementById('msg').addEventListener('click',function(e){if(e.target===this){this.classList.remove('show');}});
init();
</script>
</body>
</html>
