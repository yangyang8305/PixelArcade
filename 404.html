<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>">
<title>404 — PixelArcade</title>
<!-- 404 页面会在任意路径下被返回，样式必须内联、链接必须动态算根路径 -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #07070e; color: #eeeef8;
  font-family: 'Inter', Arial, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 24px;
}
.icon { font-size: 72px; margin-bottom: 20px; }
h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 22px; color: #ff00aa; margin-bottom: 14px;
  text-shadow: 0 0 16px rgba(255,0,170,.5);
}
p { color: #7777a0; font-size: 14px; margin-bottom: 32px; }
a.btn {
  display: inline-block; padding: 14px 36px;
  font-family: 'Press Start 2P', monospace; font-size: 11px;
  color: #000; background: #00f5ff; text-decoration: none;
  border-radius: 8px; letter-spacing: 1px;
  box-shadow: 0 0 16px rgba(0,245,255,.6), 0 0 32px rgba(0,245,255,.3);
  transition: transform .15s;
}
a.btn:hover { transform: translateY(-3px) scale(1.02); }
</style>
</head>
<body>
<div class="icon">👾</div>
<h1>404 — GAME OVER</h1>
<p>This page doesn't exist. But the games do!</p>
<a class="btn" id="homeLink" href="/">▶ Back to Arcade</a>
<script>
// GitHub Pages 项目站点部署在 /仓库名/ 子路径下，自定义域名则在根路径
var root = '/';
if (location.hostname.endsWith('.github.io')) {
  var seg = location.pathname.split('/')[1];
  if (seg) root = '/' + seg + '/';
}
document.getElementById('homeLink').href = root;
</script>
</body>
</html>
